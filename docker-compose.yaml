# ============================================================
# RemoteWeb3 - Full Docker Compose for Coolify Deployment
# ============================================================
# Domains:
#   remoteweb3.com       -> frontend  (React SPA)
#   admin.remoteweb3.com -> admin     (Admin panel)
#   api.remoteweb3.com   -> backend   (API)
#   spider.remoteweb3.com-> spider-ui (Scraper dashboard)
# ============================================================

services:
  # ========================
  # MySQL Database
  # ========================
  db:
    image: mysql:8.0
    container_name: remoteweb3-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: remoteweb3_2026
      MYSQL_DATABASE: remoteweb3
    volumes:
      - remoteweb3_mysql:/var/lib/mysql
      - ./backend/src/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-premoteweb3_2026"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - remoteweb3-network

  # ========================
  # API Backend (api.remoteweb3.com)
  # ========================
  api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: remoteweb3-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: remoteweb3_2026
      DB_NAME: remoteweb3
    expose:
      - "3000"
    depends_on:
      db:
        condition: service_started
    networks:
      - remoteweb3-network

  # ========================
  # Frontend (remoteweb3.com)
  # ========================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: remoteweb3-frontend
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - api
    networks:
      - remoteweb3-network

  # ========================
  # Admin Panel (admin.remoteweb3.com)
  # ========================
  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
    container_name: remoteweb3-admin
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - api
    networks:
      - remoteweb3-network

  # ========================
  # Spider Dashboard (spider.remoteweb3.com)
  # ========================
  spider-ui:
    build:
      context: .
      dockerfile: Dockerfile.spider
    container_name: remoteweb3-spider
    restart: unless-stopped
    expose:
      - "3001"
    depends_on:
      - api
    networks:
      - remoteweb3-network

volumes:
  remoteweb3_mysql:
    driver: local

networks:
  remoteweb3-network:
    driver: bridge
