# ============================================================
# RemoteWeb3 - Docker Compose for Coolify Deployment
# ============================================================
# Usage in Coolify:
#   1. Create new Service -> Choose Docker Compose
#   2. Point to your Git repository
#   3. Set domains: remoteweb3.com + admin.remoteweb3.com
#   4. Deploy
# ============================================================

services:
  # ========================
  # MySQL Database
  # ========================
  db:
    image: mysql:8.0
    container_name: remoteweb3-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-remoteweb3_2026}
      MYSQL_DATABASE: ${DB_NAME:-remoteweb3}
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/src/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./backend/src/db/migration.sql:/docker-entrypoint-initdb.d/02-migration.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-remoteweb3_2026}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - remoteweb3-network

  # ========================
  # Backend API (Bun + Hono)
  # ========================
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: remoteweb3-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-remoteweb3_2026}
      DB_NAME: ${DB_NAME:-remoteweb3}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - remoteweb3-network
    labels:
      - "coolify.service=backend"

  # ========================
  # Frontend (React SPA)
  # ========================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: remoteweb3-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - remoteweb3-network
    labels:
      - "coolify.service=frontend"

  # ========================
  # Admin Panel
  # ========================
  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
    container_name: remoteweb3-admin
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - remoteweb3-network
    labels:
      - "coolify.service=admin"

volumes:
  mysql_data:
    driver: local

networks:
  remoteweb3-network:
    driver: bridge
